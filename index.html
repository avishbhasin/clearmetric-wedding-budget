<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Wedding Budget Planner — Track Every Dollar | ClearMetric</title>
    <meta name="description" content="Free wedding budget planner. Track vendors, payments, and budget by category with visual breakdowns." />
    <meta name="author" content="ClearMetric" />
    <meta property="og:title" content="Wedding Budget Planner — Track Every Dollar" />
    <meta property="og:description" content="Free wedding budget planner. Track vendors, payments, and budget by category with visual breakdowns." />
    <meta property="og:type" content="website" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
    />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      #root { height: 100vh; }
      .loading {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; font-family: 'Inter', sans-serif;
        flex-direction: column; gap: 16px; color: #2c3e50;
      }
      .loading .spinner {
        width: 40px; height: 40px; border: 4px solid #e0e0e0;
        border-top: 4px solid #1a5276; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading Wedding Budget Planner...</p>
        <p style="font-size: 13px; color: #888;">Powered by ClearMetric &bull; First load may take 10-15 seconds</p>
      </div>
    </div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";
      mount(
        {
          requirements: ['plotly', 'numpy', 'pandas'],
          entrypoint: "app.py",
          files: {
            "app.py": { url: "./app.py" },
            ".streamlit/config.toml": { url: "./.streamlit/config.toml" }
          },
          streamlitConfig: {
            "client.toolbarMode": "viewer",
            "browser.gatherUsageStats": false,
          },
        },
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
